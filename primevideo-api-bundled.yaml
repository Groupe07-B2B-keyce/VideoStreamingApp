      - Authentication
      summary: Connexion et obtention des tokens JWT
      operationId: login
      description: Authentifie un utilisateur et retourne un access token (1h) et
        un refresh token (30j).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: jean.dupont@example.com
              password: SecurePass123!
              deviceName: iPhone de Jean
      responses:
        '200':
          description: Authentification réussie
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/RateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/RateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/RateLimitReset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              example:
                accessToken: eyJhbGciOiJIUzUxMiJ9.eyJzdWIiOiJ1c2VyQGV4YW1wbGUuY29tIn0...
                refreshToken: eyJhbGciOiJIUzUxMiJ9.eyJzdWIiOiJyZWZyZXNoIn0...
                tokenType: Bearer
                expiresIn: 3600
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Identifiants invalides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              example:
                type: https://api.primevideo.com/errors/invalid-credentials
                title: Identifiants invalides
                status: 401
                detail: L'email ou le mot de passe est incorrect.
                instance: /api/v1/auth/login
                correlationId: b2c3d4e5-f6a7-8901-bcde-f12345678901
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/InternalServerError'
