        hasDolbyVision:
          type: boolean
          description: Disponible en Dolby Vision
        hasDolbyAtmos:
          type: boolean
          description: Disponible en Dolby Atmos
        durationMinutes:
          type: integer
          description: Durée du contenu en minutes
