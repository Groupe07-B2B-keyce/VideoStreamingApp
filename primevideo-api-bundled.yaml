  /api/v1/titles/{titleId}/playback:
    parameters:
    - name: titleId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/UuidSchema'
    post:
      tags:
      - Playback
      summary: Lancer la lecture d'un titre
      operationId: startPlayback
      description: 'Génère un token de streaming sécurisé (JWT signé, durée 4h) avec
        l''URL HLS/DASH et les infos DRM adaptées à l''appareil. Vérifie les droits
        de diffusion dans le pays du compte avant de délivrer le token.

        '
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartPlaybackRequest'
            example:
              profileId: profile-001
              deviceType: SMART_TV
              preferredQuality: UHD_4K
              resumeFromProgress: true
      responses:
        '200':
          description: Token de lecture délivré avec succès
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/RateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/RateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/RateLimitReset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaybackToken'
              example:
                streamUrl: https://stream.primevideo.com/hls/oppenheimer/master.m3u8
                token: eyJhbGciOiJSUzI1NiJ9.eyJ0aXRsZUlkIjoib3BwZW5oZWltZXIifQ...
                expiresAt: '2024-06-01T22:00:00Z'
                format: HLS
                drmType: WIDEVINE
                availableQualities:
                - UHD_4K
                - FHD_1080P
                - HD_720P
                - SD
                subtitleTracks:
                - language: fr
                  label: Français
                  url: https://stream.primevideo.com/subs/oppenheimer/fr.vtt
                - language: en
                  label: English
                  url: https://stream.primevideo.com/subs/oppenheimer/en.vtt
                audioTracks:
                - language: fr
                  label: Français
                  codec: EAC3
                - language: en
                  label: English
                  codec: EAC3
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Accès refusé — titre non disponible dans votre pays ou abonnement
            insuffisant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              example:
                type: https://api.primevideo.com/errors/geo-restricted
                title: Contenu non disponible dans votre région
                status: 403
