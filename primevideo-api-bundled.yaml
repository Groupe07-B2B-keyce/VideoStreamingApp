        titleId:
          type: string
          format: uuid
          description: Identifiant du titre ajouté
          example: ttl-8a2b4c6d
        addedAt:
          type: string
          format: date-time
          description: Date et heure d'ajout à la watchlist
          example: '2026-03-15T20:30:00Z'
        title:
          description: Résumé du titre (fourni en réponse pour éviter un 2ème appel)
