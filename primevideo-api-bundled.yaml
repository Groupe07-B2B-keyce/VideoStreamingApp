          type:
            type: string
            enum:
            - MOVIE
            - SERIES
            - DOCUMENTARY
            - MINI_SERIES
            - STAND_UP
            description: Type de contenu
          status:
            type: string
            enum:
            - DRAFT
            - PENDING_REVIEW
            - PUBLISHED
            - ARCHIVED
            - COMING_SOON
            description: Statut de publication
          synopsis:
            type: string
            example: L'histoire de J. Robert Oppenheimer et du développement de la
              bombe atomique.
          tagline:
            type: string
            example: Le monde change pour toujours.
          rating:
            type: string
            enum:
            - G
            - PG
            - PG13
            - R
            - NC17
            - UNRATED
            - TV_MA
            - TV_14
            - TV_PG
            - TV_G
            description: Classification d'âge
          releaseYear:
            type: integer
            example: 2023
          posterUrl:
            type: string
            format: uri
            example: https://cdn.primevideo.com/titles/oppenheimer/poster.jpg
          backdropUrl:
            type: string
            format: uri
            example: https://cdn.primevideo.com/titles/oppenheimer/backdrop.jpg
          trailerUrl:
            type: string
            format: uri
          imdbId:
            type: string
            description: Identifiant IMDb
            example: tt15398776
          imdbRating:
            type: number
            format: double
            minimum: 0
            maximum: 10
            example: 8.3
          genres:
            type: array
            items:
              $ref: '#/components/schemas/Genre'
          collections:
            type: array
            items:
              $ref: '#/components/schemas/Collection'
          technicalDetails:
            $ref: '#/components/schemas/TechnicalDetails'
          accessInfo:
            $ref: '#/components/schemas/AccessInfo'
          totalSeasonsCount:
            type: integer
            description: Nombre de saisons (uniquement pour les séries)
            example: 3
    TitleSummary:
      type: object
