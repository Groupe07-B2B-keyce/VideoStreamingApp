        required:
        - episodeNumber
        - title
        - status
        - technicalDetails
        properties:
          episodeNumber:
            type: integer
            example: 1
          title:
            type: string
            example: L'Arrivée
          synopsis:
            type: string
          thumbnailUrl:
            type: string
            format: uri
          status:
            type: string
            enum:
            - DRAFT
            - PUBLISHED
            - ARCHIVED
          technicalDetails:
            $ref: '#/components/schemas/TechnicalDetails'
    Account:
      allOf:
      - $ref: '#/components/schemas/BaseEntity'
      - type: object
        required:
        - email
        - subscriptionStatus
        properties:
          email:
            type: string
            format: email
            description: Adresse email du titulaire du compte
            example: jean.dupont@example.com
          subscriptionStatus:
            type: string
            enum:
            - ACTIVE
            - SUSPENDED
            - CANCELLED
            - TRIAL
            - PAST_DUE
            description: Statut de l'abonnement
            example: ACTIVE
          subscriptionPlan:
            type: string
            enum:
            - FREE
            - BASIC
            - STANDARD
            - PREMIUM
            example: PREMIUM
          subscriptionExpiresAt:
            type: string
            format: date-time
            description: Date d'expiration de l'abonnement
            example: '2025-12-31T23:59:59Z'
          country:
            type: string
            description: Code pays ISO 3166-1 alpha-2 (affecte les droits de diffusion)
            example: FR
          phoneNumber:
            type: string
            example: '+33612345678'
          twoFactorEnabled:
            type: boolean
            description: Authentification à deux facteurs activée
            default: false
    AccountSummary:
      type: object
      description: Version allégée du compte (sans données sensibles)
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        subscriptionStatus:
          type: string
          enum:
          - ACTIVE
          - SUSPENDED
          - CANCELLED
          - TRIAL
          - PAST_DUE
        subscriptionPlan:
          type: string
          enum:
          - FREE
          - BASIC
          - STANDARD
          - PREMIUM
        subscriptionExpiresAt:
          type: string
          format: date-time
        country:
          type: string
    Profile:
      allOf:
      - $ref: '#/components/schemas/BaseEntity'
      - type: object
        required:
        - displayName
        - isKidsProfile
        properties:
          displayName:
            type: string
            minLength: 1
            maxLength: 50
            description: Nom d'affichage du profil
            example: Jean
          avatarUrl:
            type: string
            format: uri
            example: https://cdn.primevideo.com/avatars/default_01.png
          isKidsProfile:
            type: boolean
            description: Profil enfant avec restrictions de contenu
            default: false
          language:
            type: string
            description: Langue préférée de l'interface (ISO 639-1)
            example: fr
          maturityLevel:
            type: string
            enum:
            - KIDS
            - FAMILY
            - TEEN
            - MATURE
            - ADULT
            description: Niveau de maturité maximum autorisé pour ce profil
            example: ADULT
          parentalPinEnabled:
            type: boolean
            description: Code PIN parental activé pour ce profil
            default: false
          autoplayNextEpisode:
            type: boolean
            description: Lecture automatique de l'épisode suivant
            default: true
          autoplayPreviews:
            type: boolean
            description: Lecture automatique des aperçus
            default: true
          defaultAudioLanguage:
            type: string
            example: fr
          defaultSubtitleLanguage:
            type: string
            example: fr
    ProfileSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        avatarUrl:
          type: string
          format: uri
        isKidsProfile:
          type: boolean
        maturityLevel:
          type: string
    Device:
      allOf:
      - $ref: '#/components/schemas/BaseEntity'
      - type: object
        required:
        - name
        - type
        - status
        properties:
          name:
            type: string
            description: Nom de l'appareil tel que défini par l'utilisateur
            example: TV du salon
          type:
            type: string
            enum:
            - SMART_TV
            - MOBILE
            - TABLET
            - WEB
            - CONSOLE
            - STREAMING_STICK
            description: Type d'appareil
          status:
            type: string
            enum:
            - ACTIVE
            - REVOKED
            description: Statut de l'appareil
          lastUsedAt:
            type: string
            format: date-time
            description: Date de dernière utilisation
            example: '2024-06-01T20:00:00Z'
          ipAddress:
            type: string
            description: Dernière adresse IP connue (masquée partiellement)
            example: 192.168.*.*
    LoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
          example: jean.dupont@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: SecurePass123!
        deviceName:
          type: string
          description: Nom de l'appareil utilisé pour la connexion (pour l'enregistrement)
          example: iPhone de Jean
    RegisterRequest:
      type: object
      required:
      - email
      - password
      - country
      properties:
        email:
          type: string
          format: email
          example: nouveau@example.com
        password:
          type: string
          format: password
          minLength: 8
          pattern: ^(?=.*[A-Z])(?=.*[0-9]).{8,}$
          description: Au moins 8 caractères, une majuscule et un chiffre
        country:
          type: string
          description: Code pays ISO 3166-1 alpha-2
          example: FR
    TokenResponse:
      type: object
      required:
      - accessToken
      - refreshToken
      - tokenType
      - expiresIn
      properties:
        accessToken:
          type: string
          description: JWT d'accès (courte durée — 1h)
          example: eyJhbGciOiJIUzUxMiJ9...
        refreshToken:
          type: string
          description: Token de rafraîchissement (longue durée — 30j)
          example: eyJhbGciOiJIUzUxMiJ9...
        tokenType:
          type: string
          default: Bearer
        expiresIn:
          type: integer
          description: Durée de validité de l'access token en secondes
          example: 3600
    RefreshTokenRequest:
      type: object
      required:
      - refreshToken
      properties:
        refreshToken:
          type: string
          description: Token de rafraîchissement obtenu lors de la connexion
    CreateProfileRequest:
      type: object
      required:
      - displayName
      - isKidsProfile
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 50
          example: Emma
        avatarUrl:
          type: string
          format: uri
        isKidsProfile:
          type: boolean
          example: false
        maturityLevel:
          type: string
          enum:
          - KIDS
          - FAMILY
          - TEEN
          - MATURE
          - ADULT
          example: ADULT
        language:
          type: string
          example: fr
    UpdateProfileRequest:
      type: object
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 50
        avatarUrl:
          type: string
          format: uri
        language:
          type: string
        maturityLevel:
          type: string
          enum:
          - KIDS
          - FAMILY
          - TEEN
          - MATURE
          - ADULT
        autoplayNextEpisode:
          type: boolean
        autoplayPreviews:
          type: boolean
        defaultAudioLanguage:
          type: string
        defaultSubtitleLanguage:
          type: string
    SetParentalPinRequest:
      type: object
      required:
      - pin
      properties:
        pin:
          type: string
          pattern: ^\d{4}$
          description: Code PIN parental à 4 chiffres
          example: '1234'
    WatchSession:
      allOf:
      - $ref: '#/components/schemas/BaseEntity'
      - type: object
        required:
        - profileId
        - titleId
        - progressSeconds
        - status
        properties:
          profileId:
            type: string
            format: uuid
            description: Profil qui regarde
          titleId:
            type: string
            format: uuid
            description: Titre en cours de lecture
          episodeId:
            type: string
            format: uuid
            description: Épisode concerné (null si film)
          progressSeconds:
            type: integer
            description: Position actuelle dans le contenu (en secondes)
            example: 4320
          durationSeconds:
            type: integer
            description: Durée totale du contenu (en secondes)
            example: 10800
          completionPercent:
            type: number
            format: double
            description: Pourcentage de complétion (0.0 à 100.0)
            example: 40.0
          status:
            type: string
            enum:
            - IN_PROGRESS
            - COMPLETED
            - ABANDONED
            description: Statut de la session
          deviceType:
            type: string
            enum:
            - SMART_TV
            - MOBILE
            - TABLET
            - WEB
            - CONSOLE
            - STREAMING_STICK
          qualitySelected:
            type: string
            enum:
            - SD
            - HD_720P
            - FHD_1080P
            - UHD_4K
          lastWatchedAt:
            type: string
            format: date-time
            example: '2024-06-01T21:30:00Z'
    UpdateWatchProgressRequest:
      type: object
      required:
      - progressSeconds
      - durationSeconds
      properties:
        progressSeconds:
          type: integer
          minimum: 0
          description: Position actuelle en secondes
          example: 4320
        durationSeconds:
          type: integer
          minimum: 1
          description: Durée totale du contenu en secondes
          example: 10800
        episodeId:
          type: string
          format: uuid
          description: Épisode concerné (séries uniquement)
        deviceType:
          type: string
          enum:
          - SMART_TV
          - MOBILE
          - TABLET
          - WEB
          - CONSOLE
          - STREAMING_STICK
        qualitySelected:
          type: string
          enum:
          - SD
          - HD_720P
          - FHD_1080P
          - UHD_4K
    PlaybackToken:
      type: object
      description: Token de lecture sécurisé avec URL de streaming et DRM
      required:
      - streamUrl
      - token
      - expiresAt
      properties:
        streamUrl:
          type: string
          format: uri
          description: URL du flux HLS ou DASH
          example: https://stream.primevideo.com/hls/title-abc/master.m3u8
        token:
          type: string
          description: Token DRM signé (courte durée — 4h)
          example: eyJhbGciOiJSUzI1NiJ9...
        expiresAt:
          type: string
          format: date-time
          description: Expiration du token de streaming
          example: '2024-06-01T22:00:00Z'
        format:
          type: string
          enum:
          - HLS
          - DASH
          description: Format du flux vidéo
        drmType:
          type: string
          enum:
          - WIDEVINE
          - FAIRPLAY
          - PLAYREADY
          - NONE
          description: Type de protection DRM selon l'appareil
        availableQualities:
          type: array
          items:
            type: string
            enum:
            - SD
            - HD_720P
            - FHD_1080P
            - UHD_4K
          example:
          - FHD_1080P
          - HD_720P
          - SD
        subtitleTracks:
          type: array
          description: Pistes de sous-titres disponibles
          items:
            type: object
            properties:
              language:
                type: string
                example: fr
              label:
                type: string
                example: Français
              url:
                type: string
                format: uri
                example: https://stream.primevideo.com/subs/title-abc/fr.vtt
        audioTracks:
          type: array
          description: Pistes audio disponibles
          items:
            type: object
            properties:
              language:
                type: string
                example: en
              label:
                type: string
                example: English
              codec:
                type: string
                example: EAC3
    StartPlaybackRequest:
      type: object
      required:
      - profileId
      - deviceType
      properties:
        profileId:
          type: string
          format: uuid
          description: Profil qui lance la lecture
        episodeId:
          type: string
          format: uuid
          description: Épisode à lire (séries uniquement)
        deviceType:
          type: string
          enum:
          - SMART_TV
          - MOBILE
          - TABLET
          - WEB
          - CONSOLE
          - STREAMING_STICK
        preferredQuality:
          type: string
          enum:
          - SD
          - HD_720P
          - FHD_1080P
          - UHD_4K
          default: FHD_1080P
        resumeFromProgress:
          type: boolean
          description: Reprendre depuis la dernière position sauvegardée
          default: true
    TimelineEventType:
      type: string
      enum:
      - CAST_ON_SCREEN
      - MUSIC_PLAYING
      - FUN_FACT
      - TRIVIA
      - SCENE_LOCATION
      description: 'Type d''événement X-Ray : CAST_ON_SCREEN = acteur visible à l''écran,
        MUSIC_PLAYING = musique jouée à ce moment, FUN_FACT = anecdote sur la scène,
        TRIVIA = information sur le tournage, SCENE_LOCATION = lieu de tournage

        '
    TimelineEvent:
      allOf:
      - $ref: '#/components/schemas/BaseEntity'
      - type: object
        required:
        - titleId
        - eventType
        - startTimeSeconds
        - endTimeSeconds
        properties:
          titleId:
            type: string
            format: uuid
          episodeId:
            type: string
            format: uuid
            description: Épisode concerné (null si film)
          eventType:
            $ref: '#/components/schemas/TimelineEventType'
          startTimeSeconds:
            type: integer
            description: Début de l'événement dans la vidéo (en secondes)
            example: 255
          endTimeSeconds:
            type: integer
            description: Fin de l'événement dans la vidéo (en secondes)
            example: 330
          person:
            $ref: '#/components/schemas/Person'
            description: Acteur à l'écran (si eventType = CAST_ON_SCREEN)
          characterName:
            type: string
            description: Nom du personnage joué
            example: Bruce Wayne
          musicTitle:
            type: string
            description: Titre de la musique (si eventType = MUSIC_PLAYING)
            example: Time
          musicArtist:
            type: string
            description: Artiste de la musique
            example: Hans Zimmer
          text:
            type: string
            description: Texte de l'anecdote ou trivia
            example: Cette scène a été tournée en 70mm IMAX.
          imageUrl:
            type: string
            format: uri
            description: Image associée à l'événement
    WatchHistory:
      type: object
      description: Entrée dans l'historique de visionnage d'un profil
      properties:
        title:
          $ref: '#/components/schemas/TitleSummary'
        session:
          $ref: '#/components/schemas/WatchSession'
    WatchlistItem:
      type: object
