          - STAND_UP
        rating:
          type: string
        releaseYear:
          type: integer
        posterUrl:
          type: string
          format: uri
        imdbRating:
          type: number
          format: double
        accessInfo:
          $ref: '#/components/schemas/AccessInfo'
    Season:
      allOf:
      - $ref: '#/components/schemas/BaseEntity'
