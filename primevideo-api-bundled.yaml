            type: string
            format: uri
          releaseYear:
            type: integer
          episodesCount:
            type: integer
            example: 8
          status:
            type: string
            enum:
            - DRAFT
            - PUBLISHED
            - ARCHIVED
    Episode:
      allOf:
      - $ref: '#/components/schemas/BaseEntity'
