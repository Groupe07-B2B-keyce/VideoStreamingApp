# ── Serveur ──────────────────────────────────────────────────────
server.port=8070

# ── Base de données SQLite ────────────────────────────────────────
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── Thymeleaf ────────────────────────────────────────────────────
spring.thymeleaf.cache=false
