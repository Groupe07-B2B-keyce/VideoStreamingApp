<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pair to pair | Keyce Transmission</title>
  <link rel="stylesheet" th:href="@{/css/style.css(v='prime20260518')}">
  <link rel="icon" type="image/png" th:href="@{/images/logo.png}">
  <meta name="_csrf" th:content="${_csrf.token}">
  <meta name="_csrf_header" th:content="${_csrf.headerName}">
  <style>
    body { background: var(--bg-primary); }
    .p2p-shell { max-width: 1180px; margin: 0 auto; padding: 28px; }
    .p2p-header { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:24px; }
    .p2p-title { font-size:28px; font-weight:800; margin:0; }
    .p2p-subtitle { color:var(--text-secondary); margin-top:6px; font-size:14px; }
    .p2p-grid { display:grid; grid-template-columns: 360px 1fr; gap:20px; align-items:start; }
    .panel { background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:20px; }
    .panel h2 { font-size:16px; margin:0 0 16px; font-weight:700; }
    .room-row { display:flex; gap:8px; margin-bottom:12px; }
    .room-row .form-input { flex:1; }
    .btn-ghost { height:40px; padding:0 16px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text-primary); cursor:pointer; }
    .status { min-height:42px; padding:12px; border-radius:8px; background:var(--bg-secondary); color:var(--text-secondary); font-size:13px; line-height:1.4; }
    .videos { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .video-box { background:#000; border:1px solid var(--border); border-radius:10px; overflow:hidden; min-height:260px; position:relative; }
    .video-box video { width:100%; height:100%; min-height:260px; object-fit:cover; display:block; background:#000; }
    .video-label { position:absolute; left:10px; top:10px; padding:5px 9px; background:rgba(0,0,0,0.68); border-radius:999px; color:#fff; font-size:12px; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; }
    .code-pill { display:inline-flex; align-items:center; min-height:34px; padding:0 12px; border-radius:999px; background:rgba(255,208,0,0.12); color:var(--yellow); border:1px solid rgba(255,208,0,0.24); font-weight:700; letter-spacing:0; }
    @media (max-width: 900px) {
      .p2p-grid, .videos { grid-template-columns:1fr; }
      .p2p-shell { padding:18px; }
    }
  </style>
</head>
<body>
<div class="p2p-shell">
  <div class="p2p-header">
    <div>
      <h1 class="p2p-title">Serveur pair to pair</h1>
      <div class="p2p-subtitle">Appel video WebRTC avec signalisation Spring Boot locale.</div>
    </div>
    <a th:href="@{/}" class="btn-ghost" style="text-decoration:none;display:inline-flex;align-items:center;">Retour</a>
  </div>

  <div class="p2p-grid">
    <section class="panel">
      <h2>Salon P2P</h2>
      <div class="room-row">
        <button type="button" class="btn-primary" id="create-room" style="width:auto;padding:0 16px;">Creer</button>
      </div>
      <div class="room-row">
        <input class="form-input" id="room-id" placeholder="Code du salon">
        <button type="button" class="btn-ghost" id="join-room">Rejoindre</button>
      </div>
      <div style="margin:12px 0;">
        <span>Mon salon : </span>
        <span class="code-pill" id="room-label">aucun</span>
      </div>
      <div class="actions">
        <button type="button" class="btn-primary" id="start-camera" style="width:auto;padding:0 16px;">Camera</button>
        <button type="button" class="btn-ghost" id="start-call">Appeler</button>
        <button type="button" class="btn-ghost" id="hangup">Raccrocher</button>
      </div>
      <div class="status" id="status" style="margin-top:16px;">Creez un salon, partagez le code, puis lancez la camera.</div>
    </section>

    <section class="panel">
      <h2>Connexion video</h2>
      <div class="videos">
        <div class="video-box">
          <video id="local-video" autoplay muted playsinline></video>
          <span class="video-label">Moi</span>
        </div>
        <div class="video-box">
          <video id="remote-video" autoplay playsinline></video>
          <span class="video-label">Pair distant</span>
        </div>
      </div>
    </section>
  </div>
</div>

<script th:inline="javascript">
  const csrfToken = document.querySelector('meta[name="_csrf"]').content;
  const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
  const peerId = 'peer-' + Math.random().toString(36).slice(2, 10);
  const statusEl = document.getElementById('status');
  const roomInput = document.getElementById('room-id');
  const roomLabel = document.getElementById('room-label');
  const localVideo = document.getElementById('local-video');
  const remoteVideo = document.getElementById('remote-video');

  let roomId = '';
  let pollIndex = 0;
  let pollTimer = null;
  let localStream = null;
  let peerConnection = null;

  function setStatus(message) {
    statusEl.textContent = message;
  }

  async function postJson(url, data) {
    const response = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        [csrfHeader]: csrfToken
      },
      body: JSON.stringify(data || {})
    });
    if (!response.ok) throw new Error('Erreur reseau');
    return response.json();
  }

  async function createRoom() {
    const data = await postJson('/p2p/rooms', {});
    roomId = data.roomId;
    roomInput.value = roomId;
    roomLabel.textContent = roomId;
    startPolling();
    setStatus('Salon cree. Partagez ce code avec une autre personne : ' + roomId);
  }

  async function joinRoom() {
    roomId = roomInput.value.trim();
    if (!roomId) {
      setStatus('Entrez un code de salon.');
      return;
    }
    const response = await fetch('/p2p/rooms/' + encodeURIComponent(roomId));
    if (!response.ok) {
      setStatus('Salon introuvable. Verifiez le code.');
      return;
    }
    roomLabel.textContent = roomId;
    startPolling();
    setStatus('Salon rejoint. Lancez la camera puis attendez ou demarrez un appel.');
  }

  async function startCamera() {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    localVideo.srcObject = localStream;
    setStatus('Camera active.');
  }

  function createPeerConnection() {
    const pc = new RTCPeerConnection({
      iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
    });

    pc.onicecandidate = event => {
      if (event.candidate) {
        sendSignal('ice', JSON.stringify(event.candidate));
      }
    };
    pc.ontrack = event => {
      remoteVideo.srcObject = event.streams[0];
    };
    pc.onconnectionstatechange = () => {
      setStatus('Etat P2P : ' + pc.connectionState);
    };

    if (localStream) {
      localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
    }
    return pc;
  }

  async function ensurePeerConnection() {
    if (!localStream) {
      await startCamera();
    }
    if (!peerConnection) {
      peerConnection = createPeerConnection();
    }
    return peerConnection;
  }

  async function startCall() {
    if (!roomId) {
      setStatus('Creez ou rejoignez un salon avant d appeler.');
      return;
    }
    const pc = await ensurePeerConnection();
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await sendSignal('offer', JSON.stringify(offer));
    setStatus('Offre envoyee. En attente du pair distant.');
  }

  async function sendSignal(type, payload) {
    if (!roomId) return;
    await postJson('/p2p/rooms/' + encodeURIComponent(roomId) + '/signals', {
      from: peerId,
      to: '',
      type,
      payload
    });
  }

  function startPolling() {
    clearInterval(pollTimer);
    pollIndex = 0;
    pollTimer = setInterval(pollSignals, 1000);
    pollSignals();
  }

  async function pollSignals() {
    if (!roomId) return;
    const response = await fetch('/p2p/rooms/' + encodeURIComponent(roomId) + '/signals?peerId=' + encodeURIComponent(peerId) + '&after=' + pollIndex);
    if (!response.ok) return;
    const batch = await response.json();
    pollIndex = batch.nextIndex;
    for (const message of batch.messages) {
      await handleSignal(message);
    }
  }

  async function handleSignal(message) {
    const pc = await ensurePeerConnection();
    if (message.type === 'offer') {
      await pc.setRemoteDescription(JSON.parse(message.payload));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      await sendSignal('answer', JSON.stringify(answer));
      setStatus('Offre recue. Reponse envoyee.');
    } else if (message.type === 'answer') {
      await pc.setRemoteDescription(JSON.parse(message.payload));
      setStatus('Reponse recue. Connexion en cours.');
    } else if (message.type === 'ice') {
      await pc.addIceCandidate(JSON.parse(message.payload));
    }
  }

  function hangup() {
    clearInterval(pollTimer);
    pollTimer = null;
    if (peerConnection) {
      peerConnection.close();
      peerConnection = null;
    }
    if (localStream) {
      localStream.getTracks().forEach(track => track.stop());
      localStream = null;
    }
    localVideo.srcObject = null;
    remoteVideo.srcObject = null;
    setStatus('Appel termine.');
  }

  document.getElementById('create-room').addEventListener('click', createRoom);
  document.getElementById('join-room').addEventListener('click', joinRoom);
  document.getElementById('start-camera').addEventListener('click', () => startCamera().catch(error => setStatus(error.message)));
  document.getElementById('start-call').addEventListener('click', () => startCall().catch(error => setStatus(error.message)));
  document.getElementById('hangup').addEventListener('click', hangup);
</script>
</body>
</html>
