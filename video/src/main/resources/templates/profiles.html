<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes profils | Keyce Transmission</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="icon" type="image/png" th:href="@{/images/logo.png}">
</head>
<body>
<div class="app-shell">
  <header class="header">
    <a class="logo" th:href="@{/}"><img class="logo-img" th:src="@{/images/logo.png}" alt="Logo"><span class="logo-text">KEYCE <span>Transmission</span></span></a>
    <div class="header-right"><a th:href="@{/mon-compte}" class="btn-icon" title="Mon compte"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></a></div>
  </header>
  <div class="body-layout">
    <nav class="sidebar">
      <div class="nav-section">
        <a class="nav-item" th:href="@{/}"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Accueil</span></a>
        <a class="nav-item active" th:href="@{/profils}"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Profils</span></a>
        <a class="nav-item" th:href="@{/parametres}"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94L14.4 2.81c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41L9.25 5.35c-.59.24-1.13.56-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg><span>Parametres</span></a>
      </div>
    </nav>
    <main class="main-content">
      <div class="page-header profile-page-header">
        <div>
          <h1 class="page-title">Qui regarde ?</h1>
          <p class="page-subtitle">Choisissez un profil ou creez un espace personnalise.</p>
        </div>
      </div>

      <div class="profile-grid-real">
        <a class="profile-tile" th:each="profile, iter : ${profiles}" th:href="@{/profils/{id}(id=${profile.id})}">
          <div class="profile-avatar-large" th:classappend="${profile.isKidsProfile} ? ' kids' : ''">
            <span th:text="${#strings.substring(profile.displayName,0,1).toUpperCase()}">P</span>
          </div>
          <strong th:text="${profile.displayName}">Profil</strong>
          <small th:text="${profile.isKidsProfile} ? 'Enfant' : 'Standard'">Standard</small>
        </a>

        <form class="profile-create-panel" th:action="@{/profils}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <div class="profile-avatar-large add"><svg viewBox="0 0 24 24"><path d="M12 5v14m-7-7h14"/></svg></div>
          <label class="form-label" for="displayName">Nouveau profil</label>
          <input class="form-input" id="displayName" name="displayName" placeholder="Nom du profil" required maxlength="40">
          <label class="inline-check"><input type="checkbox" name="kidsProfile" value="true"> Profil enfant</label>
          <button class="btn-primary" type="submit">Ajouter</button>
        </form>
      </div>
    </main>
  </div>
</div>
</body>
</html>
