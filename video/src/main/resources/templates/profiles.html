<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes profils | Keyce Transmission</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="icon" type="image/png" th:href="@{/images/logo.png}">
  <style>
    .profiles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 24px; margin-top: 32px; }
    .profile-card { display: flex; flex-direction: column; align-items: center; gap: 12px; cursor: pointer; padding: 20px; border-radius: 12px; transition: background 0.15s; }
    .profile-card:hover { background: var(--bg-hover); }
    .profile-avatar { width: 96px; height: 96px; border-radius: 8px; background: linear-gradient(135deg, #1a1a2e, #16213e); display: flex; align-items: center; justify-content: center; border: 2px solid transparent; transition: border-color 0.15s; }
    .profile-card:hover .profile-avatar { border-color: var(--yellow); }
    .profile-avatar svg { width: 48px; height: 48px; fill: var(--text-muted); }
    .profile-name { font-size: 14px; font-weight: 500; }
    .profile-add .profile-avatar { border: 2px dashed var(--border); }
    .profile-add:hover .profile-avatar { border-color: var(--yellow); }
    .profile-add .profile-avatar svg { fill: var(--text-muted); }
  </style>
</head>
<body>
<div class="app-shell">
  <header class="header">
    <a class="logo" th:href="@{/}"><img class="logo-img" th:src="@{/images/logo.png}" alt="Logo">
      <span class="logo-text">KEYCE <span>Transmission</span></span></a>
    <div class="header-right">
      <a th:href="@{/mon-compte}" class="btn-icon"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></a>
    </div>
  </header>
  <div class="body-layout">
    <nav class="sidebar">
      <div class="nav-section">
        <a class="nav-item" th:href="@{/}"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Accueil</span></a>
        <a class="nav-item active" th:href="@{/profils}"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Profils</span></a>
      </div>
    </nav>
    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">Qui regarde ?</h1>
        <p class="page-subtitle">Sélectionnez votre profil</p>
      </div>
      <div class="profiles-grid">
        <!-- Profil principal -->
        <div class="profile-card" onclick="window.location.href='/'">
          <div class="profile-avatar" style="background:linear-gradient(135deg,#FFD000,#E6BB00);">
            <svg viewBox="0 0 24 24" style="fill:#000;"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          </div>
          <span class="profile-name">Mon profil</span>
        </div>
        <!-- Ajouter profil -->
        <div class="profile-card profile-add">
          <div class="profile-avatar">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
          </div>
          <span class="profile-name" style="color:var(--text-secondary);">Ajouter un profil</span>
        </div>
      </div>
    </main>
  </div>
</div>
</body>
</html>
