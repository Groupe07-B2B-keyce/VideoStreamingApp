<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion requise | Keyce Transmission</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="icon" type="image/png" th:href="@{/images/logo.png}">
  <style>
    .denied-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      padding: 24px;
    }
    .denied-card {
      width: 100%;
      max-width: 480px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
    }
    .denied-icon {
      width: 80px;
      height: 80px;
      background: var(--yellow-alpha);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }
    .denied-icon svg {
      width: 40px;
      height: 40px;
      fill: var(--yellow);
    }
    .denied-title {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .denied-desc {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 36px;
    }
    .denied-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .btn-primary-full {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 48px;
      background: var(--yellow);
      color: #000;
      font-size: 15px;
      font-weight: 700;
      border-radius: 8px;
      transition: background 0.15s, transform 0.1s;
      border: none;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-primary-full:hover { background: var(--yellow-dark); transform: scale(1.01); }
    .btn-secondary-full {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 48px;
      background: transparent;
      color: var(--text-primary);
      font-size: 15px;
      font-weight: 500;
      border-radius: 8px;
      border: 1px solid var(--border);
      transition: background 0.15s;
      text-decoration: none;
    }
    .btn-secondary-full:hover { background: var(--bg-hover); }
    .denied-back {
      margin-top: 20px;
      font-size: 14px;
      color: var(--text-muted);
    }
    .denied-back a {
      color: var(--yellow);
      text-decoration: none;
    }
    .denied-back a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="denied-page">
  <div class="denied-card">

    <!-- Logo -->
    <a th:href="@{/}" style="display:inline-flex;align-items:center;gap:8px;margin-bottom:32px;text-decoration:none;">
      <img th:src="@{/images/logo.png}" alt="Logo" style="height:32px;border-radius:6px;">
      <span style="font-weight:700;font-size:18px;">KEYCE <span style="color:var(--yellow);">Transmission</span></span>
    </a>

    <!-- Icon -->
    <div class="denied-icon">
      <svg viewBox="0 0 24 24">
        <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
      </svg>
    </div>

    <!-- Message -->
    <h1 class="denied-title">Connexion requise</h1>
    <p class="denied-desc">
      Vous devez être connecté pour accéder à cette page.<br>
      Rejoignez <strong>Keyce Transmission</strong> gratuitement ou connectez-vous à votre compte.
    </p>

    <!-- Actions -->
    <div class="denied-actions">
      <a class="btn-primary-full" th:href="@{/connexion}">
        <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:currentColor;">
          <path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/>
        </svg>
        Se connecter
      </a>
      <a class="btn-secondary-full" th:href="@{/inscription}">
        <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:currentColor;">
          <path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
        Créer un compte gratuit
      </a>
    </div>

    <div class="denied-back">
      <a th:href="@{/}">← Retourner à l'accueil</a>
    </div>

  </div>
</div>
</body>
</html>
