<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${pageTitle + ' | Keyce Transmission'}">Catalogue | Keyce Transmission</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="icon" type="image/png" th:href="@{/images/logo.png}">
</head>
<body>
<div class="app-shell">
  <!-- Header -->
  <header class="header">
    <a class="logo" th:href="@{/}">
      <img class="logo-img" th:src="@{/images/logo.png}" alt="Keyce Transmission Logo">
      <span class="logo-text">KEYCE <span>Transmission</span></span>
    </a>
    <form class="search-form" th:action="@{/recherche}" method="get">
      <div class="search-input-wrap">
        <input class="search-input" type="text" name="q" placeholder="Rechercher...">
      </div>
      <button type="submit" class="btn-search">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      </button>
    </form>
    <div class="header-right">
      <th:block sec:authorize="!isAuthenticated()">
        <a th:href="@{/connexion}" class="btn-signin">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          Connexion
        </a>
      </th:block>
    </div>
  </header>
  <div class="body-layout">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="nav-section">
        <a class="nav-item" th:href="@{/}">
          <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          <span>Accueil</span>
        </a>
        <a class="nav-item" th:classappend="${activeMenu == 'movies' ? ' active' : ''}" th:href="@{/films}">
          <svg viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg>
          <span>Films</span>
        </a>
        <a class="nav-item" th:classappend="${activeMenu == 'series' ? ' active' : ''}" th:href="@{/series}">
          <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 1.99-.9 1.99-2L23 5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
          <span>Séries</span>
        </a>
        <a class="nav-item" th:href="@{/ma-liste}">
          <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
          <span>Ma liste</span>
        </a>
      </div>
    </nav>
    <!-- Main -->
    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title" th:text="${pageTitle}">Catalogue</h1>
        <p class="page-subtitle" th:text="${#lists.size(titles)} + ' titres disponibles'">0 titres disponibles</p>
      </div>

      <!-- Genre Chips -->
      <div class="chips-row">
        <a class="chip" th:classappend="${selectedGenre == null ? ' active' : ''}" th:href="@{${#httpServletRequest.requestURI}}">Tout</a>
        <a class="chip" th:classappend="${selectedGenre == 'action' ? ' active' : ''}"
           th:href="@{${#httpServletRequest.requestURI}(genre='action')}">Action</a>
        <a class="chip" th:classappend="${selectedGenre == 'drama' ? ' active' : ''}"
           th:href="@{${#httpServletRequest.requestURI}(genre='drama')}">Drame</a>
        <a class="chip" th:classappend="${selectedGenre == 'comedy' ? ' active' : ''}"
           th:href="@{${#httpServletRequest.requestURI}(genre='comedy')}">Comédie</a>
        <a class="chip" th:classappend="${selectedGenre == 'thriller' ? ' active' : ''}"
           th:href="@{${#httpServletRequest.requestURI}(genre='thriller')}">Thriller</a>
      </div>

      <!-- Grid -->
      <div class="video-grid" th:if="${titles != null and !#lists.isEmpty(titles)}">
        <a class="video-card" th:each="title : ${titles}" th:href="@{/titres/{id}(id=${title.id})}">
          <div class="card-thumbnail">
            <img th:if="${title.posterUrl != null}" th:src="${title.posterUrl}" th:alt="${title.originalTitle}" loading="lazy">
            <div class="card-thumb-placeholder" th:unless="${title.posterUrl != null}">
              <svg viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg>
            </div>
            <span class="card-type-badge" th:text="${title.type}">FILM</span>
            <div class="card-overlay">
              <div class="card-play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
            </div>
          </div>
          <div class="card-info">
            <div class="card-avatar">
              <svg viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg>
            </div>
            <div class="card-meta">
              <div class="card-title" th:text="${title.originalTitle}">Titre</div>
              <div class="card-sub" th:text="${title.releaseYear}">2024</div>
              <div class="card-rating" th:if="${title.imdbRating != null}">
                <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                <span th:text="${title.imdbRating}">8.5</span>
              </div>
            </div>
          </div>
        </a>
      </div>

      <div class="empty-state" th:if="${titles == null or #lists.isEmpty(titles)}">
        <svg class="empty-icon" viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg>
        <div class="empty-title">Aucun contenu</div>
        <div class="empty-desc">Aucun titre disponible pour le moment.</div>
      </div>
    </main>
  </div>
</div>
</body>
</html>
