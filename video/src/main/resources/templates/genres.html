<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genres | Keyce Transmission</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="icon" type="image/png" th:href="@{/images/logo.png}">
  <style>
    .genres-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .genre-card {
      height: 120px; border-radius: 12px; display: flex; align-items: flex-end; padding: 16px;
      position: relative; overflow: hidden; cursor: pointer; text-decoration: none;
      transition: transform 0.15s;
    }
    .genre-card:hover { transform: scale(1.03); }
    .genre-card-title { font-size: 18px; font-weight: 700; color: #fff; position: relative; z-index: 1; }
  </style>
</head>
<body>
<div class="app-shell">
  <header class="header">
    <a class="logo" th:href="@{/}"><img class="logo-img" th:src="@{/images/logo.png}" alt="Logo">
      <span class="logo-text">KEYCE <span>Transmission</span></span></a>
    <form class="search-form" th:action="@{/recherche}" method="get">
      <div class="search-input-wrap"><input class="search-input" type="text" name="q" placeholder="Rechercher..."></div>
      <button type="submit" class="btn-search"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></button>
    </form>
  </header>
  <div class="body-layout">
    <nav class="sidebar">
      <div class="nav-section">
        <a class="nav-item" th:href="@{/}"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Accueil</span></a>
        <a class="nav-item" th:href="@{/films}"><svg viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg><span>Films</span></a>
        <a class="nav-item active" th:href="@{/genres}"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg><span>Genres</span></a>
      </div>
    </nav>
    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">Parcourir par genre</h1>
        <p class="page-subtitle">Trouvez le contenu qui vous correspond</p>
      </div>
      <div class="genres-grid">
        <a class="genre-card" th:href="@{/films(genre='action')}" style="background:linear-gradient(135deg,#b91c1c,#7f1d1d);">
          <span class="genre-card-title">Action</span></a>
        <a class="genre-card" th:href="@{/films(genre='comedy')}" style="background:linear-gradient(135deg,#d97706,#92400e);">
          <span class="genre-card-title">Comédie</span></a>
        <a class="genre-card" th:href="@{/films(genre='drama')}" style="background:linear-gradient(135deg,#1d4ed8,#1e3a8a);">
          <span class="genre-card-title">Drame</span></a>
        <a class="genre-card" th:href="@{/films(genre='thriller')}" style="background:linear-gradient(135deg,#374151,#111827);">
          <span class="genre-card-title">Thriller</span></a>
        <a class="genre-card" th:href="@{/films(genre='scifi')}" style="background:linear-gradient(135deg,#0f766e,#134e4a);">
          <span class="genre-card-title">Science-Fiction</span></a>
        <a class="genre-card" th:href="@{/films(genre='horror')}" style="background:linear-gradient(135deg,#6b21a8,#3b0764);">
          <span class="genre-card-title">Horreur</span></a>
        <a class="genre-card" th:href="@{/films(genre='romance')}" style="background:linear-gradient(135deg,#be185d,#831843);">
          <span class="genre-card-title">Romance</span></a>
        <a class="genre-card" th:href="@{/films(genre='animation')}" style="background:linear-gradient(135deg,#0369a1,#075985);">
          <span class="genre-card-title">Animation</span></a>
        <a class="genre-card" th:href="@{/films(genre='documentary')}" style="background:linear-gradient(135deg,#15803d,#14532d);">
          <span class="genre-card-title">Documentaire</span></a>
        <a class="genre-card" th:href="@{/films(genre='fantasy')}" style="background:linear-gradient(135deg,#FFD000,#b45309);">
          <span class="genre-card-title" style="color:#000;">Fantaisie</span></a>
      </div>
    </main>
  </div>
</div>
</body>
</html>
