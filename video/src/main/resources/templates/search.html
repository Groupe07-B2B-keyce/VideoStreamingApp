<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="'Recherche : ' + ${query} + ' | Keyce Transmission'">Recherche | Keyce Transmission</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="icon" type="image/png" th:href="@{/images/logo.png}">
</head>
<body>
<div class="app-shell">
  <header class="header">
    <a class="logo" th:href="@{/}"><img class="logo-img" th:src="@{/images/logo.png}" alt="Logo">
      <span class="logo-text">KEYCE <span>Transmission</span></span></a>
    <form class="search-form" th:action="@{/recherche}" method="get">
      <div class="search-input-wrap"><input class="search-input" type="text" name="q" th:value="${query}" placeholder="Rechercher..." autofocus></div>
      <button type="submit" class="btn-search"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></button>
    </form>
    <div class="header-right"><a th:href="@{/connexion}" class="btn-signin"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>Connexion</a></div>
  </header>
  <div class="body-layout">
    <nav class="sidebar">
      <div class="nav-section">
        <a class="nav-item" th:href="@{/}"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Accueil</span></a>
        <a class="nav-item" th:href="@{/films}"><svg viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg><span>Films</span></a>
        <a class="nav-item" th:href="@{/series}"><svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 1.99-.9 1.99-2L23 5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg><span>Séries</span></a>
      </div>
    </nav>
    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">Résultats pour "<span th:text="${query}">...</span>"</h1>
        <p class="page-subtitle" th:text="${#lists.size(titles)} + ' résultat(s) trouvé(s)'">0 résultat(s)</p>
      </div>
      <div class="video-grid" th:if="${titles != null and !#lists.isEmpty(titles)}">
        <a class="video-card" th:each="title : ${titles}" th:href="@{/titres/{id}(id=${title.id})}">
          <div class="card-thumbnail">
            <img th:if="${title.posterUrl != null}" th:src="${title.posterUrl}" th:alt="${title.originalTitle}" loading="lazy">
            <div class="card-thumb-placeholder" th:unless="${title.posterUrl != null}">
              <svg viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg>
            </div>
            <span class="card-type-badge" th:text="${title.type}">FILM</span>
            <div class="card-overlay"><div class="card-play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>
          </div>
          <div class="card-info">
            <div class="card-avatar"><svg viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg></div>
            <div class="card-meta">
              <div class="card-title" th:text="${title.originalTitle}">Titre</div>
              <div class="card-sub" th:text="${title.releaseYear}">2024</div>
            </div>
          </div>
        </a>
      </div>
      <div class="empty-state" th:if="${query != null and (titles == null or #lists.isEmpty(titles))}">
        <svg class="empty-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <div class="empty-title">Aucun résultat</div>
        <div class="empty-desc">Aucun titre trouvé pour "<span th:text="${query}"></span>". Essayez avec d'autres mots-clés.</div>
      </div>
    </main>
  </div>
</div>
</body>
</html>
