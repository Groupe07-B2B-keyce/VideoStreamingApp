<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Inscription à Keyce Transmission">
  <title>Inscription | Keyce Transmission</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="icon" type="image/png" th:href="@{/images/logo.png}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <img class="auth-logo-img" th:src="@{/images/logo.png}" alt="Keyce Transmission">
      <div class="auth-logo-text">KEYCE <span>Transmission</span></div>
    </div>

    <h1 class="auth-title">Créer un compte</h1>
    <p class="auth-subtitle">Rejoignez Keyce Transmission gratuitement</p>

    <!-- Error -->
    <div class="alert alert-error" th:if="${error}">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      <span th:text="${error}">Une erreur est survenue</span>
    </div>

    <!-- Form -->
    <form th:action="@{/inscription}" method="post" id="register-form">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

      <div class="form-group">
        <label class="form-label" for="email">Adresse email</label>
        <input class="form-input" type="email" id="email" name="email"
               placeholder="votre@email.com" required autofocus autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Mot de passe</label>
        <input class="form-input" type="password" id="password" name="password"
               placeholder="Au moins 8 caractères" required autocomplete="new-password"
               minlength="8">
      </div>

      <div class="form-group">
        <label class="form-label" for="country">Pays</label>
        <select class="form-input" id="country" name="country" style="cursor:pointer;">
          <option value="">Sélectionner votre pays</option>
          <option value="FR">🇫🇷 France</option>
          <option value="BE">🇧🇪 Belgique</option>
          <option value="CI">🇨🇮 Côte d'Ivoire</option>
          <option value="SN">🇸🇳 Sénégal</option>
          <option value="MA">🇲🇦 Maroc</option>
          <option value="DZ">🇩🇿 Algérie</option>
          <option value="TN">🇹🇳 Tunisie</option>
          <option value="CM">🇨🇲 Cameroun</option>
          <option value="CD">🇨🇩 RD Congo</option>
          <option value="CA">🇨🇦 Canada</option>
          <option value="US">🇺🇸 États-Unis</option>
          <option value="ES">🇪🇸 Espagne</option>
          <option value="OTHER">Autre</option>
        </select>
      </div>

      <button type="submit" class="btn-primary" id="btn-register">Créer mon compte</button>
    </form>

    <p style="font-size:12px;color:var(--text-muted);text-align:center;margin-top:16px;line-height:1.5;">
      En créant un compte, vous acceptez nos
      <a href="#" style="color:var(--yellow);">Conditions d'utilisation</a> et notre
      <a href="#" style="color:var(--yellow);">Politique de confidentialité</a>.
    </p>

    <div class="auth-divider">ou</div>

    <div class="auth-footer">
      Déjà un compte ?
      <a th:href="@{/connexion}">Se connecter</a>
    </div>

    <div class="auth-footer" style="margin-top:12px;">
      <a th:href="@{/}" style="color:var(--text-secondary);">← Retour à l'accueil</a>
    </div>

  </div>
</div>
</body>
</html>
