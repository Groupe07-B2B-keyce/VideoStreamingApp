<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Connexion à Keyce Transmission">
  <title>Connexion | Keyce Transmission</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="icon" type="image/png" th:href="@{/images/logo.png}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <img class="auth-logo-img" th:src="@{/images/logo.png}" alt="Keyce Transmission">
      <div class="auth-logo-text">KEYCE <span>Transmission</span></div>
    </div>

    <h1 class="auth-title">Bon retour !</h1>
    <p class="auth-subtitle">Connectez-vous pour accéder à votre catalogue</p>

    <!-- Error -->
    <div class="alert alert-error" th:if="${param.error}">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      Email ou mot de passe incorrect
    </div>

    <!-- Success (logout) -->
    <div class="alert alert-success" th:if="${param.logout}">
      <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
      Déconnexion réussie
    </div>


    <!-- Success (registration) -->
    <div class="alert alert-success" th:if="${param.registered}">
      <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
      Compte cree avec succes. Vous pouvez maintenant vous connecter.
    </div>
    <!-- Form -->
    <form th:action="@{/connexion}" method="post" id="login-form">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

      <div class="form-group">
        <label class="form-label" for="username">Adresse email</label>
        <input class="form-input" type="email" id="username" name="username"
               placeholder="votre@email.com" required autofocus autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Mot de passe</label>
        <input class="form-input" type="password" id="password" name="password"
               placeholder="••••••••" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn-primary" id="btn-login">Se connecter</button>
    </form>

    <div class="auth-divider">ou</div>

    <div class="auth-footer">
      Pas encore de compte ?
      <a th:href="@{/inscription}">Créer un compte</a>
    </div>

    <div class="auth-footer" style="margin-top:12px;">
      <a th:href="@{/}" style="color:var(--text-secondary);">← Retour à l'accueil</a>
    </div>

  </div>
</div>
</body>
</html>
