<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${profile.displayName + ' | Keyce Transmission'}">Profil | Keyce Transmission</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="icon" type="image/png" th:href="@{/images/logo.png}">
</head>
<body>
<div class="app-shell">
  <header class="header">
    <a class="logo" th:href="@{/}"><img class="logo-img" th:src="@{/images/logo.png}" alt="Logo"><span class="logo-text">KEYCE <span>Transmission</span></span></a>
    <div class="header-right"><a th:href="@{/profils}" class="btn-signin">Changer de profil</a></div>
  </header>
  <div class="body-layout">
    <nav class="sidebar">
      <div class="nav-section">
        <a class="nav-item" th:href="@{/}"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Accueil</span></a>
        <a class="nav-item active" th:href="@{/profils}"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Profils</span></a>
        <a class="nav-item" th:href="@{/films}"><svg viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg><span>Films</span></a>
      </div>
    </nav>
    <main class="main-content">
      <div class="profile-detail-hero">
        <div class="profile-avatar-xl" th:classappend="${profile.isKidsProfile} ? ' kids' : ''">
          <span th:text="${#strings.substring(profile.displayName,0,1).toUpperCase()}">P</span>
        </div>
        <div>
          <p class="profile-eyebrow">Profil actif</p>
          <h1 th:text="${profile.displayName}">Mon profil</h1>
          <p th:text="${profile.isKidsProfile} ? 'Espace enfant avec controle de maturite.' : 'Espace personnel avec recommandations et lecture automatique.'">Description</p>
        </div>
      </div>

      <div class="alert alert-success" th:if="${successMsg}" th:text="${successMsg}"></div>

      <div class="profile-detail-layout">
        <section class="profile-settings-panel">
          <h2>Details du profil</h2>
          <form th:action="@{/profils/{id}(id=${profile.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="form-group">
              <label class="form-label" for="displayName">Nom affiche</label>
              <input class="form-input" id="displayName" name="displayName" th:value="${profile.displayName}" required maxlength="40">
            </div>
            <div class="profile-form-row">
              <div class="form-group">
                <label class="form-label" for="language">Langue</label>
                <select class="form-input" id="language" name="language">
                  <option value="fr" th:selected="${profile.language == 'fr'}">Francais</option>
                  <option value="en" th:selected="${profile.language == 'en'}">Anglais</option>
                  <option value="es" th:selected="${profile.language == 'es'}">Espagnol</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" for="maturityLevel">Maturite</label>
                <select class="form-input" id="maturityLevel" name="maturityLevel">
                  <option value="ADULT" th:selected="${profile.maturityLevel == 'ADULT'}">Adulte</option>
                  <option value="TEEN" th:selected="${profile.maturityLevel == 'TEEN'}">Adolescent</option>
                  <option value="KIDS" th:selected="${profile.maturityLevel == 'KIDS'}">Enfant</option>
                </select>
              </div>
            </div>
            <div class="settings-toggles">
              <label class="toggle-line"><input type="checkbox" name="kidsProfile" value="true" th:checked="${profile.isKidsProfile}"><span>Profil enfant</span></label>
              <label class="toggle-line"><input type="checkbox" name="autoplayNextEpisode" value="true" th:checked="${profile.autoplayNextEpisode}"><span>Lecture automatique de l'episode suivant</span></label>
              <label class="toggle-line"><input type="checkbox" name="autoplayPreviews" value="true" th:checked="${profile.autoplayPreviews}"><span>Apercus automatiques</span></label>
            </div>
            <button class="btn-primary" type="submit">Enregistrer</button>
          </form>
        </section>

        <aside class="profile-summary-panel">
          <h2>Autres profils</h2>
          <a class="profile-mini-row" th:each="item : ${profiles}" th:href="@{/profils/{id}(id=${item.id})}" th:classappend="${item.id.equals(profile.id)} ? ' active' : ''">
            <span th:text="${#strings.substring(item.displayName,0,1).toUpperCase()}">P</span>
            <div><strong th:text="${item.displayName}">Profil</strong><small th:text="${item.isKidsProfile} ? 'Enfant' : 'Standard'">Standard</small></div>
          </a>
        </aside>
      </div>
    </main>
  </div>
</div>
</body>
</html>
