<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Prime Video'">Prime Video</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header th:fragment="header" class="app-header">
        <div class="header-left">
            <a href="/" class="logo">
                <i class="fas fa-play-circle logo-icon"></i>
                Prime Video
            </a>
        </div>
        <div class="header-center">
            <div class="search-container">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Rechercher des titres, genres..." onkeyup="handleSearch(event)">
                    <i class="fas fa-search search-icon"></i>
                </div>
            </div>
        </div>
        <div class="header-right">
            <button class="nav-icon-btn"><i class="fas fa-bell"></i></button>
            <div class="user-profile" onclick="location.href='/login'">
                <i class="fas fa-user-circle"></i>
            </div>
        </div>
    </header>

    <aside th:fragment="sidebar" class="sidebar" id="sidebar">
        <ul class="nav-list">
            <li class="nav-item">
                <a href="/" class="nav-link" th:classappend="${activeMenu == 'home'} ? 'active'">
                    <i class="fas fa-home nav-icon"></i>
                    <span>Accueil</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">
                    <i class="fas fa-film nav-icon"></i>
                    <span>Films</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">
                    <i class="fas fa-tv nav-icon"></i>
                    <span>Séries</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">
                    <i class="fas fa-plus nav-icon"></i>
                    <span>Ma liste</span>
                </a>
            </li>
            <li style="margin: 24px 0; border-top: 1px solid var(--glass-border);"></li>
            <li class="nav-item">
                <a href="/swagger-ui.html" target="_blank" class="nav-link">
                    <i class="fas fa-code nav-icon"></i>
                    <span>API Docs</span>
                </a>
            </li>
        </ul>
    </aside>

    <script th:fragment="scripts">
        function handleSearch(event) {
            const query = event.target.value.toLowerCase();
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const title = card.querySelector('.card-title').textContent.toLowerCase();
                card.style.display = title.includes(query) ? '' : 'none';
            });
        }

        function showToast(msg) {
            console.log("Toast:", msg);
        }
    </script>
</body>
</html>
