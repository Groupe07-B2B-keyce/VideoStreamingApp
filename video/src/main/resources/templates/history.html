<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historique | Keyce Transmission</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="icon" type="image/png" th:href="@{/images/logo.png}">
</head>
<body>
<div class="app-shell">
  <header class="header">
    <a class="logo" th:href="@{/}"><img class="logo-img" th:src="@{/images/logo.png}" alt="Logo">
      <span class="logo-text">KEYCE <span>Transmission</span></span></a>
    <div class="header-right"><a th:href="@{/mon-compte}" class="btn-icon"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></a></div>
  </header>
  <div class="body-layout">
    <nav class="sidebar">
      <div class="nav-section">
        <a class="nav-item" th:href="@{/}"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Accueil</span></a>
        <a class="nav-item active" th:href="@{/historique}"><svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 1 0 9 9h-2a7 7 0 1 1-7-7V1l4 4-4 4V3zM12 8v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg><span>Historique</span></a>
      </div>
    </nav>
    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">Historique</h1>
        <p class="page-subtitle">Vos visionnages récents</p>
      </div>
      <div class="empty-state">
        <svg class="empty-icon" viewBox="0 0 24 24"><path d="M13 3a9 9 0 1 0 9 9h-2a7 7 0 1 1-7-7V1l4 4-4 4V3zM12 8v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
        <div class="empty-title">Aucun visionnage</div>
        <div class="empty-desc">Votre historique apparaîtra ici après vos premiers visionnages.</div>
        <a th:href="@{/}" style="margin-top:16px;color:var(--yellow);text-decoration:none;">← Retour à l'accueil</a>
      </div>
    </main>
  </div>
</div>
</body>
</html>
