<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ma liste | Keyce Transmission</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="icon" type="image/png" th:href="@{/images/logo.png}">
</head>
<body>
<div class="app-shell">
  <header class="header">
    <a class="logo" th:href="@{/}"><img class="logo-img" th:src="@{/images/logo.png}" alt="Logo">
      <span class="logo-text">KEYCE <span>Transmission</span></span></a>
    <form class="search-form" th:action="@{/recherche}" method="get">
      <div class="search-input-wrap"><input class="search-input" type="text" name="q" placeholder="Rechercher..."></div>
      <button type="submit" class="btn-search"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></button>
    </form>
    <div class="header-right"><a th:href="@{/mon-compte}" class="btn-icon"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></a></div>
  </header>
  <div class="body-layout">
    <nav class="sidebar">
      <div class="nav-section">
        <a class="nav-item" th:href="@{/}"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Accueil</span></a>
        <a class="nav-item" th:href="@{/films}"><svg viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg><span>Films</span></a>
        <a class="nav-item active" th:href="@{/ma-liste}"><svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg><span>Ma liste</span></a>
      </div>
    </nav>
    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">Ma liste</h1>
        <p class="page-subtitle">Les titres que vous avez sauvegardés</p>
      </div>
      <div class="empty-state">
        <svg class="empty-icon" viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2zm0 16l-5-2.18L7 19V5h10v14z"/></svg>
        <div class="empty-title">Votre liste est vide</div>
        <div class="empty-desc">Ajoutez des films et séries à votre liste pour les retrouver facilement.</div>
        <a th:href="@{/films}" class="btn-hero-play" style="margin-top:16px;text-decoration:none;display:inline-flex;align-items:center;gap:8px;height:44px;padding:0 24px;background:var(--yellow);color:#000;font-weight:700;border-radius:24px;">
          <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:currentColor;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
          Explorer le catalogue
        </a>
      </div>
    </main>
  </div>
</div>
</body>
</html>
