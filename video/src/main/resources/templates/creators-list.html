<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créateurs Africains | Keyce Transmission</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <style>
    .creators-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
    .creator-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; display: flex; flex-direction: column; align-items: center; text-align: center; transition: transform 0.2s; }
    .creator-card:hover { transform: translateY(-5px); border-color: var(--yellow); }
    .creator-avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--bg-secondary); margin-bottom: 16px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--yellow); }
    .creator-avatar svg { width: 40px; height: 40px; fill: var(--yellow); }
    .creator-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .verified-badge { width: 18px; height: 18px; fill: #1d9bf0; }
    .creator-subs { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }
    .creator-bio { font-size: 14px; color: var(--text-muted); line-height: 1.5; margin-bottom: 20px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .btn-subscribe { width: 100%; height: 40px; border-radius: 20px; background: var(--text-primary); color: var(--bg-primary); font-weight: 700; font-size: 14px; border: none; cursor: pointer; transition: opacity 0.2s; }
    .btn-subscribe:hover { opacity: 0.9; }
    .btn-subscribed { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border); }
  </style>
</head>
<body>
<div class="app-shell">
  <header class="header" th:replace="~{index :: header}"></header>
  <div class="body-layout">
    <nav class="sidebar" th:replace="~{index :: sidebar}"></nav>
    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">Talents Africains</h1>
        <p class="page-subtitle">Abonnez-vous à vos créateurs préférés pour ne rien manquer.</p>
      </div>

      <div class="flash-success" th:if="${successMsg}" th:text="${successMsg}" style="background: rgba(43,166,64,0.1); border: 1px solid rgba(43,166,64,0.3); color: #5beb75; padding: 12px; border-radius: 8px; margin-bottom: 20px;"></div>

      <div class="creators-grid">
        <div class="creator-card" th:each="c : ${creators}">
          <div class="creator-avatar">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          </div>
          <div class="creator-name">
            <span th:text="${c.displayName}">Nom du Créateur</span>
            <svg th:if="${c.verified}" class="verified-badge" viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zM10 17l-5-5 1.4-1.4 3.6 3.6 7.6-7.6L19 8l-9 9z"/></svg>
          </div>
          <div class="creator-subs" th:text="${c.subscriberCount} + ' abonnés'">0 abonnés</div>
          <p class="creator-bio" th:text="${c.bio}">Bio du créateur...</p>
          
          <form th:action="@{/s-abonner/{id}(id=${c.id})}" method="post" style="width:100%;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn-subscribe">S'abonner</button>
          </form>
        </div>
      </div>

      <div class="empty-state" th:if="${#lists.isEmpty(creators)}">
        <svg class="empty-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg>
        <div class="empty-title">Aucun créateur pour le moment</div>
        <div class="empty-desc">Soyez le premier à passer en mode PRO !</div>
        <a th:href="@{/devenir-createur}" class="btn-primary" style="margin-top:16px;text-decoration:none;display:inline-flex;align-items:center;padding:0 24px;">Devenir Créateur</a>
      </div>
    </main>
  </div>
</div>
</body>
</html>
