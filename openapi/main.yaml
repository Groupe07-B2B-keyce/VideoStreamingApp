openapi: 3.0.3
info:
  title: Prime Video Clone API
  version: 1.0.0
  description: Spécification OpenAPI 3.0 pour le clone de Prime Video (Approche Domain-Driven Design).
servers:
  - url: http://localhost:8080/api/v1
    description: Serveur de développement local
security:
  - bearerAuth: []
paths:
  # ---- SOCIAL & ENGAGEMENT ----
  /profiles/{profileId}/watchlist:
    $ref: './paths/social.yaml#/paths/~1profiles~1{profileId}~1watchlist'
  /profiles/{profileId}/watchlist/{watchlistItemId}:
    $ref: './paths/social.yaml#/paths/~1profiles~1{profileId}~1watchlist~1{watchlistItemId}'
  /titles/{titleId}/reviews:
    $ref: './paths/social.yaml#/paths/~1titles~1{titleId}~1reviews'
  /titles/{titleId}/reviews/{reviewId}:
    $ref: './paths/social.yaml#/paths/~1titles~1{titleId}~1reviews~1{reviewId}'
  /profiles/{profileId}/recommendations:
    $ref: './paths/social.yaml#/paths/~1profiles~1{profileId}~1recommendations'
  /groupwatch:
    $ref: './paths/social.yaml#/paths/~1groupwatch'
  /groupwatch/{sessionId}:
    $ref: './paths/social.yaml#/paths/~1groupwatch~1{sessionId}'
  /groupwatch/{sessionId}/join:
    $ref: './paths/social.yaml#/paths/~1groupwatch~1{sessionId}~1join'
  /groupwatch/{sessionId}/control:
    $ref: './paths/social.yaml#/paths/~1groupwatch~1{sessionId}~1control'
  /groupwatch/{sessionId}/leave:
    $ref: './paths/social.yaml#/paths/~1groupwatch~1{sessionId}~1leave'
  # ---- PLAYBACK & X-RAY ----
  /titles/{titleId}/playback:
    $ref: './paths/playback.yaml#/paths/~1titles~1{titleId}~1playback'
  /profiles/{profileId}/watch-progress:
    $ref: './paths/playback.yaml#/paths/~1profiles~1{profileId}~1watch-progress'
  /profiles/{profileId}/watch-progress/{titleId}:
    $ref: './paths/playback.yaml#/paths/~1profiles~1{profileId}~1watch-progress~1{titleId}'
  /titles/{titleId}/xray:
    $ref: './paths/playback.yaml#/paths/~1titles~1{titleId}~1xray'
  /admin/titles/{titleId}/xray:
    $ref: './paths/playback.yaml#/paths/~1admin~1titles~1{titleId}~1xray'
  # ---- ADMIN & LICENSING ----
  /partner/titles:
    $ref: './paths/admin.yaml#/paths/~1partner~1titles'
  /partner/titles/{jobId}:
    $ref: './paths/admin.yaml#/paths/~1partner~1titles~1{jobId}'
  /partner/analytics/{titleId}:
    $ref: './paths/admin.yaml#/paths/~1partner~1analytics~1{titleId}'
  /admin/ingestion-queue:
    $ref: './paths/admin.yaml#/paths/~1admin~1ingestion-queue'
  /admin/ingestion-queue/{jobId}/status:
    $ref: './paths/admin.yaml#/paths/~1admin~1ingestion-queue~1{jobId}~1status'
  /admin/titles/{titleId}/licenses:
    $ref: './paths/admin.yaml#/paths/~1admin~1titles~1{titleId}~1licenses'
  /admin/stats:
    $ref: './paths/admin.yaml#/paths/~1admin~1stats'
  # ---- IDENTITY & ACCESS ----
  /auth/register:
    $ref: './paths/identity.yaml#/paths/~1auth~1register'
  /auth/login:
    $ref: './paths/identity.yaml#/paths/~1auth~1login'
  /auth/refresh:
    $ref: './paths/identity.yaml#/paths/~1auth~1refresh'
  /auth/logout:
    $ref: './paths/identity.yaml#/paths/~1auth~1logout'
  /accounts/me:
    $ref: './paths/identity.yaml#/paths/~1accounts~1me'
  /accounts/me/profiles:
    $ref: './paths/identity.yaml#/paths/~1accounts~1me~1profiles'
  /accounts/me/profiles/{profileId}:
    $ref: './paths/identity.yaml#/paths/~1accounts~1me~1profiles~1{profileId}'
  /accounts/me/profiles/{profileId}/parental-pin:
    $ref: './paths/identity.yaml#/paths/~1accounts~1me~1profiles~1{profileId}~1parental-pin'
  /accounts/me/devices:
    $ref: './paths/identity.yaml#/paths/~1accounts~1me~1devices'
  /accounts/me/devices/{deviceId}:
    $ref: './paths/identity.yaml#/paths/~1accounts~1me~1devices~1{deviceId}'
  # ---- CORE CATALOG ----
  /titles:
    $ref: './paths/catalog.yaml#/paths/~1titles'
  /titles/{titleId}:
    $ref: './paths/catalog.yaml#/paths/~1titles~1{titleId}'
  /titles/{titleId}/casting:
    $ref: './paths/catalog.yaml#/paths/~1titles~1{titleId}~1casting'
  /titles/{titleId}/seasons:
    $ref: './paths/catalog.yaml#/paths/~1titles~1{titleId}~1seasons'
  /titles/{titleId}/seasons/{seasonNumber}/episodes:
    $ref: './paths/catalog.yaml#/paths/~1titles~1{titleId}~1seasons~1{seasonNumber}~1episodes'
  /genres:
    $ref: './paths/catalog.yaml#/paths/~1genres'
  /collections:
    $ref: './paths/catalog.yaml#/paths/~1collections'
  /collections/{collectionId}/titles:
    $ref: './paths/catalog.yaml#/paths/~1collections~1{collectionId}~1titles'

components:
  securitySchemes:
    bearerAuth:
      $ref: './components/security.yaml#/bearerAuth'
  
  responses:
    RateLimitError:
      $ref: './components/responses.yaml#/RateLimitError'
    BadRequest:
      $ref: './components/responses.yaml#/BadRequest'
    Unauthorized:
      $ref: './components/responses.yaml#/Unauthorized'
    Forbidden:
      $ref: './components/responses.yaml#/Forbidden'
    NotFound:
      $ref: './components/responses.yaml#/NotFound'
    InternalServerError:
      $ref: './components/responses.yaml#/InternalServerError'
      
  parameters:
    PageParam:
      $ref: './components/parameters.yaml#/PageParam'
    LimitParam:
      $ref: './components/parameters.yaml#/LimitParam'
      
  schemas:
    ProblemDetails:
      $ref: './components/schemas/errors.yaml#/ProblemDetails'
    ValidationError:
      $ref: './components/schemas/errors.yaml#/ValidationError'
    # Playback schemas
    WatchSession:
      $ref: './components/schemas/playback.yaml#/WatchSession'
    PlaybackToken:
      $ref: './components/schemas/playback.yaml#/PlaybackToken'
    TimelineEvent:
      $ref: './components/schemas/playback.yaml#/TimelineEvent'
    # Admin schemas
    IngestionJob:
      $ref: './components/schemas/admin.yaml#/IngestionJob'
    License:
      $ref: './components/schemas/admin.yaml#/License'
    TitleAnalytics:
      $ref: './components/schemas/admin.yaml#/TitleAnalytics'
    GlobalPlatformStats:
      $ref: './components/schemas/admin.yaml#/GlobalPlatformStats'
    # Identity schemas
    Account:
      $ref: './components/schemas/identity.yaml#/Account'
    AccountSummary:
      $ref: './components/schemas/identity.yaml#/AccountSummary'
    Profile:
      $ref: './components/schemas/identity.yaml#/Profile'
    ProfileSummary:
      $ref: './components/schemas/identity.yaml#/ProfileSummary'
    Device:
      $ref: './components/schemas/identity.yaml#/Device'
    TokenResponse:
      $ref: './components/schemas/identity.yaml#/TokenResponse'
    # Catalog schemas
    Title:
      $ref: './components/schemas/catalog.yaml#/Title'
    TitleSummary:
      $ref: './components/schemas/catalog.yaml#/TitleSummary'
    Season:
      $ref: './components/schemas/catalog.yaml#/Season'
    Episode:
      $ref: './components/schemas/catalog.yaml#/Episode'
    Genre:
      $ref: './components/schemas/catalog.yaml#/Genre'
    Collection:
      $ref: './components/schemas/catalog.yaml#/Collection'
    CastingMember:
      $ref: './components/schemas/catalog.yaml#/CastingMember'
    Person:
      $ref: './components/schemas/catalog.yaml#/Person'
    # Social schemas
    WatchlistItem:
      $ref: './components/schemas/social.yaml#/WatchlistItem'
    WatchlistPage:
      $ref: './components/schemas/social.yaml#/WatchlistPage'
    Review:
      $ref: './components/schemas/social.yaml#/Review'
    ReviewSummary:
      $ref: './components/schemas/social.yaml#/ReviewSummary'
    ReviewPage:
      $ref: './components/schemas/social.yaml#/ReviewPage'
    Recommendation:
      $ref: './components/schemas/social.yaml#/Recommendation'
    RecommendationPage:
      $ref: './components/schemas/social.yaml#/RecommendationPage'
    GroupWatchSession:
      $ref: './components/schemas/social.yaml#/GroupWatchSession'
    GroupWatchParticipant:
      $ref: './components/schemas/social.yaml#/GroupWatchParticipant'
