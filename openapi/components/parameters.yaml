PageParam:
  name: page
  in: query
  description: "Numéro de la page pour la pagination"
  required: false
  schema:
    type: integer
    minimum: 1
    default: 1

LimitParam:
  name: limit
  in: query
  description: "Nombre maximal d'éléments par page"
  required: false
  schema:
    type: integer
    minimum: 1
    maximum: 100
    default: 20
